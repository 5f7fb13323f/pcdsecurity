<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosting na warsztaty</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            background-color: #fafafa;
            color: #333;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: normal;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            margin: 0;
        }

        /* Prosty kontener na animację */
        .loading-container {
            margin-top: 20px;
            height: 30px;
            font-size: 2rem;
            color: #999;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <h1>Hosting na warsztaty</h1>
    <p>Miejsce zarezerwowane. Strona wkrótce się tu pojawi.</p>
    
    <div class="loading-container" id="dots"></div>

    <script>
        // Prosty skrypt JavaScript do animacji kropek
        const dotsElement = document.getElementById('dots');
        let count = 0;

        setInterval(() => {
            count = (count + 1) % 4; // Cykl od 0 do 3 kropek
            dotsElement.textContent = '.'.repeat(count);
        }, 500); // Zmiana co pół sekundy
    </script>

</body>
</html>
